<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mocking-box</title>
<style>
  :root {
    --surface: #fcfcfb;
    --surface-2: #f4f4f1;
    --ink: #1d1d1b;
    --ink-2: #5b5b56;
    --ink-3: #8e8e87;
    --border: rgba(11,11,11,0.10);
    --hairline: #e1e0d9;
    --good: #0ca30c;       --good-text: #006300;
    --warning: #fab219;    --warning-text: #7a5200;
    --critical: #d03b3b;   --critical-text: #a12525;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface: #1a1a19; --surface-2: #232322;
      --ink: #ececea; --ink-2: #a8a8a2; --ink-3: #7a7a74;
      --border: rgba(255,255,255,0.10); --hairline: #2c2c2a;
      --good-text: #2fbf2f; --warning-text: #fab219; --critical-text: #e06060;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--surface); color: var(--ink);
         font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
  header { display: flex; align-items: center; gap: 4px; padding: 0 20px;
           border-bottom: 1px solid var(--hairline); }
  header h1 { font-size: 15px; margin: 0 18px 0 0; padding: 14px 0; letter-spacing: -0.01em; }
  nav { display: flex; gap: 2px; }
  nav button {
    border: none; background: none; color: var(--ink-2); font: inherit; cursor: pointer;
    padding: 14px 12px; border-bottom: 2px solid transparent; font-size: 13.5px;
  }
  nav button:hover { color: var(--ink); }
  nav button.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 600; }
  #lang-toggle { margin-left: auto; border: 1px solid var(--border); background: none;
    color: var(--ink-2); border-radius: 6px; padding: 4px 10px; cursor: pointer; font: inherit; font-size: 12.5px; }
  #lang-toggle:hover { background: var(--surface-2); }

  main { padding: 18px 20px; max-width: 1280px; margin: 0 auto; }
  h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
       color: var(--ink-3); margin: 18px 0 8px; font-weight: 600; }
  h2:first-child { margin-top: 0; }
  .muted { color: var(--ink-3); }
  .mono { font-family: var(--mono); font-size: 12.5px; }
  .empty { color: var(--ink-3); padding: 32px 0; text-align: center; }

  .card { border: 1px solid var(--border); border-radius: 10px; padding: 16px; background: var(--surface); margin-bottom: 14px; }
  .card h2 { margin-top: 0; }
  .card .desc { color: var(--ink-3); font-size: 12.5px; margin: 2px 0 10px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 860px) { .grid2 { grid-template-columns: 1fr; } }

  label { display: block; font-size: 12px; color: var(--ink-2); margin: 10px 0 4px; }
  input[type=text], input[type=number], input[type=password], select, textarea {
    width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px;
    background: var(--surface); color: var(--ink); font: inherit; font-size: 13px;
  }
  textarea { font-family: var(--mono); font-size: 12.5px; min-height: 68px; resize: vertical; }
  input:focus, select:focus, textarea:focus { outline: 1.5px solid var(--ink-3); }
  .row { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 140px; }
  .hint { font-size: 11.5px; color: var(--ink-3); margin-top: 3px; }

  button.btn {
    border: 1px solid var(--border); background: var(--surface-2); color: var(--ink);
    font: inherit; font-size: 13px; padding: 7px 14px; border-radius: 7px; cursor: pointer;
  }
  button.btn:hover { border-color: var(--ink-3); }
  button.btn.primary { background: var(--ink); color: var(--surface); border-color: var(--ink); }
  button.btn.danger { color: var(--critical-text); }
  button.btn:disabled { opacity: 0.45; cursor: default; }
  button.btn.small { padding: 4px 10px; font-size: 12px; }

  .tiles { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .tile { border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; min-width: 118px;
          background: none; color: inherit; font: inherit; text-align: left; cursor: pointer; }
  .tile:hover { background: var(--surface-2); }
  .tile.on { border-color: var(--ink); }
  .tile .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--ink-2); display: flex; align-items: center; gap: 6px; }
  .tile .value { font-size: 25px; font-weight: 650; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex: none; }

  .verdict { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono);
    font-size: 12px; font-weight: 600; }
  .verdict .dot { width: 7px; height: 7px; }
  .v-MATCH { color: var(--good-text); }    .v-MATCH .dot { background: var(--good); }
  .v-ERROR { color: var(--warning-text); } .v-ERROR .dot { background: var(--warning); }
  .v-NOISE { color: var(--warning-text); } .v-NOISE .dot { background: var(--warning); }
  .v-RESPONSE_DIFF, .v-WRITESET_DIFF, .v-BOTH_DIFF { color: var(--critical-text); }
  .v-RESPONSE_DIFF .dot, .v-WRITESET_DIFF .dot, .v-BOTH_DIFF .dot { background: var(--critical); }
  .chip { display: inline-flex; align-items: center; gap: 5px; padding: 1px 8px;
    border-radius: 999px; border: 1px solid var(--border); font-size: 11.5px;
    font-family: var(--mono); font-variant-numeric: tabular-nums; }

  table.t { width: 100%; border-collapse: collapse; }
  table.t th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--ink-3); font-weight: 600; padding: 6px 10px; border-bottom: 1px solid var(--hairline); }
  table.t td { padding: 8px 10px; border-bottom: 1px solid var(--hairline); vertical-align: top; }
  table.t tr.click { cursor: pointer; }
  table.t tr.click:hover td, table.t tr.open td { background: var(--surface-2); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }

  .runbar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 12px; }
  .runbtn { flex: none; text-align: left; border: 1px solid var(--border); border-radius: 8px;
    background: none; color: inherit; cursor: pointer; font: inherit; padding: 8px 12px; }
  .runbtn:hover { background: var(--surface-2); }
  .runbtn.active { background: var(--surface-2); border-color: var(--ink-3); }
  .runbtn .when { font-family: var(--mono); font-size: 12px; }
  .runbtn .chips { margin-top: 3px; display: flex; gap: 5px; }

  .detail { padding: 14px; background: var(--surface-2); border-radius: 0 0 8px 8px; }
  .detail h3 { font-size: 12px; margin: 14px 0 6px; color: var(--ink-2);
    text-transform: uppercase; letter-spacing: 0.06em; }
  .detail h3:first-child { margin-top: 0; }
  table.diffs { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 12px; }
  table.diffs th { text-align: left; color: var(--ink-3); font-weight: 600; padding: 4px 8px; }
  table.diffs td { padding: 4px 8px; border-top: 1px solid var(--hairline); word-break: break-all; }
  table.diffs td.old { color: var(--critical-text); }
  table.diffs td.new { color: var(--good-text); }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 860px) { .cols { grid-template-columns: 1fr; } }
  .pane { min-width: 0; }
  .pane .pane-title { font-size: 11.5px; color: var(--ink-2); margin-bottom: 4px; font-family: var(--mono); }
  pre { margin: 0; padding: 10px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow-x: auto; font-family: var(--mono); font-size: 12px;
    line-height: 1.45; max-height: 360px; }
  details.raw summary, details.adv summary { cursor: pointer; color: var(--ink-2); font-size: 12.5px; margin: 10px 0 6px; }
  details.adv { margin-top: 6px; }

  .progress { height: 8px; border-radius: 999px; background: var(--surface-2);
    border: 1px solid var(--border); overflow: hidden; margin: 8px 0 4px; }
  .progress > div { height: 100%; background: var(--good); width: 0%; transition: width .3s; }
  .status-line { display: flex; align-items: center; gap: 8px; font-size: 13px; flex-wrap: wrap; }
  .pulse { width: 9px; height: 9px; border-radius: 50%; background: var(--good); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .toast { position: fixed; bottom: 18px; right: 18px; background: var(--ink); color: var(--surface);
    padding: 10px 16px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 10; }
  .toast.show { opacity: 1; }
  .sortrule { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
  .sortrule input { flex: 1; }
  .sortrule .rm { border: none; background: none; color: var(--critical-text); cursor: pointer; font-size: 15px; }
  .flow { font-family: var(--mono); font-size: 12px; line-height: 1.7; color: var(--ink-2);
    background: var(--surface-2); border-radius: 8px; padding: 10px 14px; overflow-x: auto; white-space: pre; }
</style>
</head>
<body>
<header>
  <h1>mocking-box</h1>
  <nav id="nav"></nav>
  <button id="lang-toggle"></button>
</header>
<main id="main"></main>
<div class="toast" id="toast"></div>

let lang = localStorage.getItem("mb-lang") || (navigator.language.startsWith("ko") ? "ko" : "en");
const t = k => (MSG[lang] && MSG[lang][k]) || MSG.en[k] || k;

/* ------------------------------------------------------------------ state */
let tab = localStorage.getItem("mb-tab") || "dashboard";
if (tab === "replay") tab = "capture"; // replay 탭은 capture로 통합됨
let currentRunFile = null;
let currentRun = null;
let cfgCache = null;
let capturePoll = null, replayPoll = null;
let verdictFilter = "ALL";

const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmtVal = v => v === null || v === undefined ? "null" : (typeof v === "string" ? v : JSON.stringify(v));
const pretty = s => { if (!s) return "(empty)"; try { return JSON.stringify(JSON.parse(s), null, 2); } catch { return s; } };
const verdictHTML = v => `<span class="verdict v-${esc(v)}"><span class="dot"></span>${esc(v)}</span>`;
const toast = msg => { const el = document.getElementById("toast"); el.textContent = msg; el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 2600); };
const isGoldenName = n => (n || "").endsWith(".golden.jsonl");

async function api(path, opts) {
  const res = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || res.statusText);
  return data;
}

/* ------------------------------------------------------------------ shell */
function renderShell() {
  document.documentElement.lang = lang;
  const tabs = [
    ["dashboard", t("tab_dashboard")],
    ["capture", t("tab_capture")],
    ["seed", t("tab_seed")],
    ["settings", t("tab_settings")],
  ];
  document.getElementById("nav").innerHTML = tabs.map(([id, label]) =>
    `<button data-tab="${id}" class="${tab === id ? "active" : ""}">${esc(label)}</button>`).join("");
  document.querySelectorAll("#nav button").forEach(el =>
    el.addEventListener("click", () => { tab = el.dataset.tab; localStorage.setItem("mb-tab", tab); render(); }));
  const lt = document.getElementById("lang-toggle");
  lt.textContent = t("lang_btn");
  lt.onclick = () => { lang = lang === "ko" ? "en" : "ko"; localStorage.setItem("mb-lang", lang); render(); };
}

function render() {
  renderShell();
  ({dashboard: renderDashboard, capture: renderCapture, seed: renderSeed, settings: renderSettings}[tab])();
}

/* ------------------------------------------------------------- dashboard */
const FILTERS = [
  { key: "ALL",   labelKey: "filter_all", dot: "var(--ink-3)",
    match: () => true },
  { key: "MATCH", labelKey: "match", dot: "var(--good)",
    match: r => r.verdict === "MATCH" },
  { key: "DIFF",  labelKey: "diff", dot: "var(--critical)",
    match: r => ["RESPONSE_DIFF", "WRITESET_DIFF", "BOTH_DIFF"].includes(r.verdict) },
  { key: "NOISE", labelKey: "noise", dot: "var(--warning)",
    match: r => r.verdict === "NOISE" },
  { key: "ERROR", labelKey: "error", dot: "var(--warning)",
    match: r => r.verdict === "ERROR" },
];

async function renderDashboard() {
  const main = document.getElementById("main");
  main.innerHTML = `<h2>${esc(t("runs"))}</h2><div id="runbar" class="runbar"></div><div id="run-view"></div>`;
  let runs;
  try { runs = await api("/api/runs"); }
  catch (e) { main.innerHTML = `<div class="empty">${esc(t("err_prefix"))}${esc(e.message)}</div>`; return; }
  if (!runs.length) {
    document.getElementById("runbar").innerHTML = `<div class="empty" style="width:100%">${esc(t("no_runs"))}</div>`;
    return;
  }
  document.getElementById("runbar").innerHTML = runs.map(r => {
    const bad = (r.summary.RESPONSE_DIFF||0)+(r.summary.WRITESET_DIFF||0)+(r.summary.BOTH_DIFF||0);
    const noise = r.summary.NOISE||0, err = r.summary.ERROR||0;
    const when = (r.generated_at||r.file).replace("T"," ").slice(5,19);
    return `<button class="runbtn ${r.file===currentRunFile?"active":""}" data-file="${esc(r.file)}">
      <div class="when">${esc(when)}</div>
      <div class="chips">
        <span class="chip v-MATCH"><span class="dot" style="background:var(--good)"></span>${r.summary.MATCH||0}</span>
        ${bad?`<span class="chip v-BOTH_DIFF"><span class="dot" style="background:var(--critical)"></span>${bad}</span>`:""}
        ${noise?`<span class="chip v-NOISE"><span class="dot" style="background:var(--warning)"></span>${noise}</span>`:""}
        ${err?`<span class="chip v-ERROR"><span class="dot" style="background:var(--warning)"></span>${err}</span>`:""}
      </div></button>`;
  }).join("");
  document.querySelectorAll(".runbtn").forEach(el =>
    el.addEventListener("click", () => loadRun(el.dataset.file)));
  loadRun(currentRunFile && runs.some(r => r.file === currentRunFile) ? currentRunFile : runs[0].file);
}

async function loadRun(file) {
  currentRunFile = file;
  document.querySelectorAll(".runbtn").forEach(el => el.classList.toggle("active", el.dataset.file === file));
  currentRun = await api(`/api/run?file=${encodeURIComponent(file)}`);
  renderRunView();
}

function renderRunView() {
  const run = currentRun;
  const s = run.summary || {};
  const results = run.results || [];
  const counts = {
    ALL: results.length,
    MATCH: s.MATCH||0,
    DIFF: (s.RESPONSE_DIFF||0)+(s.WRITESET_DIFF||0)+(s.BOTH_DIFF||0),
    NOISE: s.NOISE||0,
    ERROR: s.ERROR||0,
  };
  if (verdictFilter !== "ALL" && !counts[verdictFilter]) verdictFilter = "ALL";
  document.getElementById("run-meta")?.remove();

  const filterDef = FILTERS.find(f => f.key === verdictFilter);
  const visible = results.map((r, i) => ({r, i})).filter(({r}) => filterDef.match(r));

  const rows = visible.map(({r, i}) => {
    const first = (r.differences||[])[0];
    const detail = r.error ? esc(r.error)
      : first ? `${esc(first.path)}: ${esc(fmtVal(first.old))} → ${esc(fmtVal(first.new))}` +
                (r.differences.length > 1 ? ` <span class="muted">(+${r.differences.length-1})</span>` : "")
      : (r.verdict === "NOISE" ? `<span class="muted">${(r.noise_differences||[]).length} noise</span>` : "");
    return `
    <tr class="click" data-i="${i}">
      <td class="num muted">${i+1}</td>
      <td>${esc(r.name)}</td>
      <td class="mono">${esc(r.request)}</td>
      <td>${verdictHTML(r.verdict)}</td>
      <td class="mono">${esc(r.old_status ?? "—")}/${esc(r.new_status ?? "—")}</td>
      <td class="num mono">${(r.old_writeset||[]).length}/${(r.new_writeset||[]).length}</td>
      <td class="mono muted" style="max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${detail}</td></tr>
    <tr class="detail-row" data-i="${i}" hidden><td colspan="7"><div class="detail" id="detail-${i}"></div></td></tr>`;
  }).join("");

  document.getElementById("run-view").innerHTML = `
    <div class="tiles">${FILTERS.map(f => `
      <button class="tile ${verdictFilter===f.key?"on":""}" data-filter="${f.key}">
        <div class="label"><span class="dot" style="background:${f.dot}"></span>${esc(t(f.labelKey))}</div>
        <div class="value">${counts[f.key]}</div>
      </button>`).join("")}
    </div>
    <h2>${esc(t("results"))} — <span class="mono">${esc(run.corpus||"")}</span>
      <span class="muted" style="text-transform:none">· ${esc(run.old_base_url||"")} ↔ ${esc(run.new_base_url||"")}</span></h2>
    ${visible.length ? `<table class="t">
      <thead><tr><th>#</th><th>${esc(t("col_name"))}</th><th>${esc(t("col_request"))}</th>
      <th>${esc(t("col_verdict"))}</th><th>${esc(t("col_status"))}</th><th>${esc(t("col_writes"))}</th>
      <th>${esc(t("col_first_diff"))}</th></tr></thead><tbody>${rows}</tbody></table>`
      : `<div class="empty">0</div>`}`;

  document.querySelectorAll(".tile").forEach(el =>
    el.addEventListener("click", () => { verdictFilter = el.dataset.filter; renderRunView(); }));
  document.querySelectorAll("tr.click").forEach(el =>
    el.addEventListener("click", () => toggleDetail(+el.dataset.i)));

  if (verdictFilter === "ALL") {
    const firstBad = results.findIndex(r => r.verdict !== "MATCH" && r.verdict !== "NOISE");
    if (firstBad >= 0) toggleDetail(firstBad);
  }
}

function toggleDetail(i) {
  const run = currentRun;
  const row = document.querySelector(`tr.click[data-i="${i}"]`);
  const holder = document.querySelector(`tr.detail-row[data-i="${i}"]`);
  if (!row || !holder) return;
  const wasOpen = !holder.hidden;
  document.querySelectorAll("tr.detail-row").forEach(el => el.hidden = true);
  document.querySelectorAll("tr.click").forEach(el => el.classList.remove("open"));
  if (wasOpen) return;
  holder.hidden = false; row.classList.add("open");
  const r = run.results[i];
  const diffsTable = (r.differences||[]).length ? `
    <table class="diffs"><thead><tr><th>${esc(t("kind"))}</th><th>${esc(t("path"))}</th>
      <th>${esc(t("old"))}</th><th>${esc(t("new"))}</th></tr></thead>
    <tbody>${r.differences.map(d => `<tr><td class="muted">${esc(d.kind)}</td><td>${esc(d.path)}</td>
      <td class="old">${esc(fmtVal(d.old))}</td><td class="new">${esc(fmtVal(d.new))}</td></tr>`).join("")}</tbody></table>`
    : `<div class="muted">${esc(t("no_diff"))}</div>`;
  const noiseTable = (r.noise_differences||[]).length ? `
    <h3>${esc(t("noise_diffs"))}</h3>
    <table class="diffs" style="opacity:.6"><tbody>${r.noise_differences.map(d => `
      <tr><td class="muted">${esc(d.kind)}</td><td>${esc(d.path)}</td>
      <td>${esc(fmtVal(d.old))}</td><td>${esc(fmtVal(d.new))}</td></tr>`).join("")}</tbody></table>` : "";
  const ws = side => (side||[]).length ? JSON.stringify(side, null, 2) : t("no_writes");
  document.getElementById(`detail-${i}`).innerHTML = `
    <h3>${esc(t("differences"))} ${verdictHTML(r.verdict)} <span class="muted" style="text-transform:none">· ${esc(t("duration"))} ${r.duration_ms||0}ms</span></h3>
    ${r.error ? `<div class="mono" style="color:var(--warning-text)">${esc(r.error)}</div>` : diffsTable}
    ${noiseTable}
    <h3>${esc(t("writeset"))}</h3>
    <div class="cols">
      <div class="pane"><div class="pane-title">${esc(t("old"))} — ${(r.old_writeset||[]).length} ${esc(t("changes"))}</div><pre>${esc(ws(r.old_writeset))}</pre></div>
      <div class="pane"><div class="pane-title">${esc(t("new"))} — ${(r.new_writeset||[]).length} ${esc(t("changes"))}</div><pre>${esc(ws(r.new_writeset))}</pre></div>
    </div>
    <details class="raw"><summary>${esc(t("response_bodies"))} (${esc(r.old_status ?? "—")} / ${esc(r.new_status ?? "—")})</summary>
      <div class="cols">
        <div class="pane"><div class="pane-title">${esc(t("old"))}</div><pre>${esc(pretty(r.old_body))}</pre></div>
        <div class="pane"><div class="pane-title">${esc(t("new"))}</div><pre>${esc(pretty(r.new_body))}</pre></div>
      </div></details>`;
}

}

async function renderAgents() {
  const box = document.getElementById("agents");
  if (!box) return;
  const dashHost = location.host;
  const cmd = `mockingbox collect --port 8080 --out rec.golden.jsonl --dashboard http://${dashHost}`;
  const cmdBlock = `<div class="hint">${esc(t("collect_cmd_label"))}</div>
    <div class="flow" style="margin-bottom:10px">${esc(cmd)}</div>`;
  const agents = await api("/api/agents").catch(() => []);
  if (!agents.length) { box.innerHTML = cmdBlock + `<div class="empty" style="padding:12px 0">${esc(t("no_collectors"))}</div>`; return; }
  const dotColor = h => h === "green" ? "var(--good)" : h === "yellow" ? "var(--warning)" : "var(--critical)";
  box.innerHTML = `<table class="t"><thead><tr>
      <th></th><th>${esc(t("col_name"))}</th><th>mode</th><th>${esc(t("col_state"))}</th>
      <th>${esc(t("col_count"))}</th><th>${esc(t("col_last_seen"))}</th><th>out</th></tr></thead>
    <tbody>${agents.map(a => `<tr>
      <td><span class="dot" style="background:${dotColor(a.health)}"></span></td>
      <td>${esc(a.name)} <span class="muted mono">${esc(a.id)}</span></td>
      <td class="mono">${esc(a.mode)}</td>
      <td class="mono">${esc(a.state)}${a.last_error ? ` <span style="color:var(--critical-text)">${esc(a.last_error.slice(0,40))}</span>` : ""}</td>
      <td class="num">${a.count}</td>
      <td class="mono muted">${a.last_seen_s}${esc(t("ago_s"))}</td>
      <td class="mono muted">${esc(a.out||"")}</td></tr>`).join("")}</tbody></table>`;
  box.innerHTML = cmdBlock + box.innerHTML;
  clearTimeout(renderAgents._t);
  if (tab === "capture") renderAgents._t = setTimeout(renderAgents, 5000);
}

function startCapturePoll() {
  clearInterval(capturePoll);
  capturePoll = setInterval(async () => {
    if (tab !== "capture") { clearInterval(capturePoll); return; }
    const st = await api("/api/capture/status").catch(() => null);
    if (!st || !st.running) { clearInterval(capturePoll); renderCapture(); return; }
    const el = document.getElementById("cap-count");
    if (el) el.textContent = st.count;
  }, 1500);
}

async function renderCorpora() {
  const box = document.getElementById("corpora");
  if (!box) return;
  const corpora = await api("/api/corpora").catch(() => []);
  const st = await api("/api/replay/status").catch(() => ({running:false}));
  if (!corpora.length) { box.innerHTML = `<div class="empty">${esc(t("no_corpora"))}</div>`; return; }
  box.innerHTML = `<table class="t"><thead><tr>
      <th>${esc(t("corpus_name"))}</th><th>${esc(t("col_type"))}</th><th>${esc(t("col_count"))}</th>
      <th>${esc(t("col_size"))}</th><th>${esc(t("col_modified"))}</th><th></th></tr></thead>
    <tbody>${corpora.map(c => `<tr>
      <td class="mono">${esc(c.name)}</td>
      <td>${c.golden
        ? `<span class="chip v-MATCH"><span class="dot" style="background:var(--good)"></span>${esc(t("type_golden"))}</span>`
        : `<span class="chip muted">${esc(t("type_requests"))}</span>`}</td>
      <td class="num">${c.count}</td>
      <td class="num muted">${((c.size||0)/1024).toFixed(1)} KB</td>
      <td class="mono muted">${esc(c.modified_at||"")}</td>
      <td style="text-align:right">
        <button class="btn small" data-corpus="${esc(c.name)}" ${st.running?"disabled":""}
          title="${esc(c.golden ? t("verify_hint_row") : t("live_hint_row"))}">
          ${esc(c.golden ? t("run_verify") : t("run_live"))}</button></td>
    </tr>`).join("")}</tbody></table>`;
  box.querySelectorAll("button[data-corpus]").forEach(el =>
    el.addEventListener("click", async () => {
      try {
        await api("/api/replay/start", {method:"POST", headers:{"content-type":"application/json"},
          body: JSON.stringify({corpus: el.dataset.corpus})});
        startReplayPoll();
        renderCorpora();
      } catch (e) { toast(t("err_prefix") + e.message); }
    }));
}

function renderReplayStatus(st) {
  const box = document.getElementById("rp-status");
  if (!box) return;
  if (st.running) {
    const pct = st.total ? Math.round(st.done / st.total * 100) : 0;
    box.innerHTML = `
      <div class="status-line"><span class="pulse"></span>
        <strong>${esc(t("replaying"))}</strong>
        <span class="mono">${esc(st.corpus||"")} · ${st.done}/${st.total} ${esc(st.current||"")}</span></div>
      <div class="progress"><div style="width:${pct}%"></div></div>`;
  } else if (st.last_error) {
    box.innerHTML = `<div class="hint" style="color:var(--critical-text); margin-bottom:8px">${esc(st.last_error)}</div>`;
  } else if (st.last_report) {
    box.innerHTML = `<div class="status-line" style="margin-bottom:8px">
      <span class="dot" style="background:var(--good)"></span> ${esc(t("replay_done"))}
      <button class="btn small" id="goto-run">${esc(t("view_result"))}</button></div>`;
    document.getElementById("goto-run").onclick = () => {
      currentRunFile = st.last_report; tab = "dashboard"; localStorage.setItem("mb-tab", tab); render();
    };
  } else {
    box.innerHTML = "";
  }
}

function startReplayPoll() {
  clearInterval(replayPoll);
  replayPoll = setInterval(async () => {
    const st = await api("/api/replay/status").catch(() => null);
    if (!st) return;
    if (tab === "capture") renderReplayStatus(st);
    if (!st.running) {
      clearInterval(replayPoll);
      if (tab === "capture") { renderReplayStatus(st); renderCorpora(); }
    }
  }, 900);
}

/* ------------------------------------------------------------------ seed */
let seedPoll = null;
// per-datastore discovery/selection, keyed by datastore name (session-local)
let seedEdits = {};
async function renderSeed() {
  const main = document.getElementById("main");
  let cfg;
  try { cfg = cfgCache = await api("/api/config"); }
  catch (e) { main.innerHTML = `<div class="empty">${esc(t("err_prefix"))}${esc(e.message)}</div>`; return; }

  const newDS = (cfg.new?.datastores || []);
  const olds = (cfg.old?.datastores || []);
  if (!newDS.length) {
    main.innerHTML = `<div class="card"><h2>${esc(t("seed_title"))}</h2>
      <div class="empty">${esc(t("no_new_ds"))}</div></div>`;
    return;
  }
  main.innerHTML = `
    <p class="desc muted" style="margin:0 0 12px; font-size:13px">${esc(t("seed_desc"))}</p>
    <div id="seed-cards"></div>
    <button class="btn primary" id="seed-run" style="margin:4px 0 12px">${esc(t("seed_run"))}</button>
    <div id="seed-status"></div>`;

  const box = document.getElementById("seed-cards");
  newDS.forEach(nd => {
    // reference (old) DB = seed source, matched by name
    const od = olds.find(o => o.name === nd.name) || {};
    if (!seedEdits[nd.name]) seedEdits[nd.name] = { exclude: od.exclude_tables || [], discovered: null };
    const card = document.createElement("div");
    card.className = "card";
    const srcLabel = od.host ? `${esc(od.host)}:${od.port}` : `<span style="color:var(--critical-text)">${esc(t("seed_src"))} 미설정 — 설정 탭</span>`;
    card.innerHTML = `
      <h2>${esc(nd.name)} <span class="muted" style="text-transform:none">
        ${esc(od.host||"?")}:${od.port||"?"} → ${esc(nd.host)}:${nd.port}</span></h2>
      <div class="status-line" style="margin-bottom:8px">
        <span class="muted">${esc(t("db_pair_ref"))}: <span class="mono">${srcLabel}</span></span>
        <button class="btn small discover-btn" ${od.host?"":"disabled"} style="margin-left:auto">${esc(t("discover"))}</button>
      </div>
      <div class="picker" data-name="${esc(nd.name)}"></div>`;
    box.appendChild(card);
    card.querySelector(".discover-btn").onclick = () => discoverFor(nd.name, od, card);
    if (seedEdits[nd.name].discovered) renderPicker(nd.name, card.querySelector(".picker"));
  });

  document.getElementById("seed-run").onclick = () => runSeedAll(cfg);
  const st = await api("/api/seed/status").catch(()=>({}));
  renderSeedStatus(st);
  if (st.running) pollSeed();
}

async function discoverFor(name, od, card) {
  const src = { host: od.host, port: od.port || 3306, user: od.user, password: od.password };
  if (!src.host) { toast(t("err_prefix") + "reference DB not set"); return; }
  const btn = card.querySelector(".discover-btn");
  btn.textContent = t("discovering"); btn.disabled = true;
  try {
    const schemas = await api("/api/seed/discover", {method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify(src)});
    seedEdits[name].discovered = schemas;
    const ex = new Set(seedEdits[name].exclude);
    seedEdits[name].selected = {};
    schemas.forEach(s => s.tables.forEach(tb => { seedEdits[name].selected[s.name+"."+tb.name] = !ex.has(s.name+"."+tb.name) && !ex.has(tb.name); }));
    renderPicker(name, card.querySelector(".picker"));
  } catch (e) { toast(t("err_prefix") + e.message); }
  finally { btn.textContent = t("discover"); btn.disabled = false; }
}

function renderPicker(name, box) {
  const schemas = seedEdits[name].discovered || [];
  const sel = seedEdits[name].selected || {};
  box.innerHTML = `<label>${esc(t("pick_schemas"))}</label>` + schemas.map(s => {
    const rows = s.tables.map(tb => {
      const key = s.name + "." + tb.name;
      return `<label style="display:flex;align-items:center;gap:8px;padding:2px 0;font-size:12.5px">
        <input type="checkbox" class="tbl-cb" data-key="${esc(key)}" ${sel[key]!==false?"checked":""} style="width:auto">
        <span class="mono">${esc(tb.name)}</span>
        <span class="muted mono" style="margin-left:auto">${tb.rows.toLocaleString()} rows · ${tb.size_mb} ${esc(t("size_mb"))}</span>
      </label>`;
    }).join("");
    return `<div style="border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin:6px 0">
      <div class="mono" style="font-weight:600;margin-bottom:4px">${esc(s.name)}
        <span class="muted" style="font-weight:400">· ${s.tables.length} ${esc(t("tables_n"))}</span></div>
      ${rows}</div>`;
  }).join("");
  box.querySelectorAll(".tbl-cb").forEach(cb =>
    cb.addEventListener("change", () => { seedEdits[name].selected[cb.dataset.key] = cb.checked; }));
}

async function runSeedAll(cfg) {
  // save the picked scope (schemas/exclude) onto the OLD datastore (= seed source),
  // since RunPairs reads scope from the reference DB. Then seed.
  const oldStack = JSON.parse(JSON.stringify(cfg.old || { datastores: [] }));
  oldStack.datastores = oldStack.datastores || [];
  Object.keys(seedEdits).forEach(name => {
    const edit = seedEdits[name];
    if (!edit.discovered) return;
    const schemas = new Set(), exclude = [];
    edit.discovered.forEach(s => s.tables.forEach(tb => {
      const key = s.name + "." + tb.name;
      if (edit.selected[key] !== false) schemas.add(s.name);
      else exclude.push(key);
    }));
    const od = oldStack.datastores.find(d => d.name === name);
    if (od) { od.schemas = [...schemas]; od.exclude_tables = exclude; }
  });
  const payload = { ...cfg, old: oldStack };
  try {
    cfgCache = await api("/api/config", {method:"PUT", headers:{"content-type":"application/json"}, body: JSON.stringify(payload)});
    await api("/api/seed/start", {method:"POST"});
    pollSeed();
  } catch (e) { toast(t("err_prefix") + e.message); }
}

function renderSeedStatus(st) {
  const box = document.getElementById("seed-status");
  if (!box) return;
  if (st.running) {
    box.innerHTML = `<div class="status-line"><span class="pulse"></span> ${esc(t("seeding"))}</div>`;
  } else if (st.error) {
    box.innerHTML = `<div class="hint" style="color:var(--critical-text)">${esc(st.error)}</div>`;
  } else if (st.done) {
    box.innerHTML = `<div class="status-line"><span class="dot" style="background:var(--good)"></span>
      ${esc(t("seed_done"))} — <span class="mono">${st.tables} tables, ${st.rows} rows</span></div>`;
  } else { box.innerHTML = ""; }
}

function pollSeed() {
  clearInterval(seedPoll);
  seedPoll = setInterval(async () => {
    const st = await api("/api/seed/status").catch(()=>null);
    if (!st) return;
    if (tab === "seed") renderSeedStatus(st);
    if (!st.running) clearInterval(seedPoll);
  }, 1000);
}

/* -------------------------------------------------------------- settings */
async function renderSettings() {
  const main = document.getElementById("main");
  let cfg;
  try { cfg = cfgCache = await api("/api/config"); }
  catch (e) { main.innerHTML = `<div class="empty">${esc(t("err_prefix"))}${esc(e.message)}</div>`; return; }

  const sortRules = (cfg.compare?.sort_arrays || []);
  main.innerHTML = `
    <p class="desc muted" style="margin:0 0 12px; font-size:13px">${esc(t("settings_desc"))}</p>
    <h2>${esc(t("sec_urls"))}</h2>
    <div class="card">
      <label>${esc(t("new_url_label"))}</label><input type="text" class="mono" id="new-url" value="${esc(cfg.new?.base_url||"")}">
      <label style="margin-top:12px">${esc(t("old_url_label"))}</label><input type="text" class="mono" id="old-url" value="${esc(cfg.old?.base_url||"")}">
    </div>
    <h2>${esc(t("sec_dbs"))}</h2>
    <div class="card">
      <p class="desc">${esc(t("db_pair_hint"))}</p>
      <div id="db-pairs"></div>
      <button class="btn small" id="pair-add">${esc(t("ds_add"))}</button>
    </div>
    <h2>${esc(t("sec_compare"))}</h2>
    <div class="grid2">
      <div class="card"><h2>${esc(t("noise_title"))}</h2>
        <p class="desc">${esc(t("noise_desc"))}</p>
        <label>${esc(t("response_paths"))}</label><textarea id="ns-resp">${esc((cfg.noise?.response_paths||[]).join("\n"))}</textarea>
        <label>${esc(t("noise_columns"))}</label><textarea id="ns-cols">${esc((cfg.noise?.columns||[]).join("\n"))}</textarea>
        <label>${esc(t("tables_ignore"))}</label><textarea id="ns-tables" style="min-height:38px">${esc((cfg.noise?.tables_ignore||[]).join("\n"))}</textarea>
      </div>
      <div class="card"><h2>${esc(t("sort_title"))}</h2>
        <p class="desc">${esc(t("sort_desc"))}</p>
        <div id="sort-rules"></div>
        <button class="btn small" id="add-rule">${esc(t("add_rule"))}</button>
      </div>
    </div>
    <details class="adv">
      <summary>${esc(t("sec_advanced"))}</summary>
      <div class="card"><div class="row">
        <div><label>${esc(t("quiet_ms"))}</label><input type="number" class="mono" id="at-quiet" value="${cfg.attribution?.quiet_ms||300}"></div>
        <div><label>${esc(t("timeout_ms"))}</label><input type="number" class="mono" id="at-timeout" value="${cfg.attribution?.timeout_ms||5000}"></div>
        <div><label>${esc(t("http_timeout"))}</label><input type="number" class="mono" id="http-timeout" value="${cfg.http_timeout_s||10}"></div>
      </div></div>
    </details>
    <button class="btn primary" id="save-settings" style="margin:14px 0 30px">${esc(t("save"))}</button>`;

  // old↔new DB pairs (one row = reference conn + target conn, matched by name)
  const pairsBox = document.getElementById("db-pairs");
  const connFields = (side, d) => `
    <div class="row" style="margin-top:4px">
      <div><label>${esc(t("mysql_host"))}</label><input type="text" class="mono ${side}-host" value="${esc(d.host||"127.0.0.1")}"></div>
      <div style="max-width:78px"><label>${esc(t("mysql_port"))}</label><input type="number" class="mono ${side}-port" value="${d.port||3306}"></div>
      <div><label>${esc(t("mysql_user"))}</label><input type="text" class="mono ${side}-user" value="${esc(d.user||"")}"></div>
      <div><label>${esc(t("mysql_password"))}</label><input type="password" class="mono ${side}-pw" value="${esc(d.password||"")}"></div>
    </div>`;
  const refreshPairNames = () => {
    const rows = pairsBox.querySelectorAll(".pair-row");
    rows.forEach(row => { row.querySelector(".pair-name-wrap").style.display = rows.length > 1 ? "" : "none"; });
  };
  const addPair = (od = {}, nd = {}) => {
    const div = document.createElement("div");
    div.className = "pair-row";
    div.style = "border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px";
    div.innerHTML = `
      <div class="row">
        <div class="pair-name-wrap" style="flex:1.4"><label>${esc(t("ds_name"))}</label>
          <input type="text" class="mono pair-name" value="${esc(nd.name||od.name||"default")}"></div>
        <div style="flex:1"></div>
        <div style="flex:0"><button class="btn small pair-rm danger" title="${esc(t("ds_remove"))}">✕</button></div>
      </div>
      <div class="cols" style="margin-top:6px">
        <div class="pane"><div class="pane-title">${esc(t("db_pair_ref"))}</div>${connFields("ref", od)}</div>
        <div class="pane"><div class="pane-title">${esc(t("db_pair_new"))}</div>${connFields("tgt", nd)}</div>
      </div>`;
    div._schemas = od.schemas; div._exclude = od.exclude_tables;
    div.querySelector(".pair-rm").onclick = () => { div.remove(); refreshPairNames(); };
    pairsBox.appendChild(div);
    refreshPairNames();
  };
  {
    const olds = cfg.old?.datastores || [], news = cfg.new?.datastores || [];
    const names = [...new Set([...news.map(d=>d.name), ...olds.map(d=>d.name)])];
    if (names.length) names.forEach(n => addPair(olds.find(d=>d.name===n)||{}, news.find(d=>d.name===n)||{}));
    else addPair();
  }
  document.getElementById("pair-add").onclick = () => addPair();

  const rulesBox = document.getElementById("sort-rules");
  const addRule = (path = "", by = "") => {
    const div = document.createElement("div");
    div.className = "sortrule";
    div.innerHTML = `<input type="text" class="mono sr-path" placeholder="${esc(t("sort_path"))}" value="${esc(path)}">
      <input type="text" class="mono sr-by" placeholder="${esc(t("sort_by"))}" value="${esc(by)}">
      <button class="rm" title="remove">✕</button>`;
    div.querySelector(".rm").onclick = () => div.remove();
    rulesBox.appendChild(div);
  };
  sortRules.forEach(r => addRule(r.path, r.by));
  document.getElementById("add-rule").onclick = () => addRule();

  document.getElementById("save-settings").onclick = async () => {
    const lines = id => document.getElementById(id).value.split("\n").map(s => s.trim()).filter(Boolean);
    // build old & new datastores from the pair rows (matched by name)
    const oldDS = [], newDS = [];
    const pairRows = pairsBox.querySelectorAll(".pair-row");
    pairRows.forEach((row, i) => {
      let name = row.querySelector(".pair-name").value.trim();
      if (!name) name = pairRows.length > 1 ? "db" + (i+1) : "default";
      const conn = side => ({
        host: row.querySelector(`.${side}-host`).value.trim(),
        port: +row.querySelector(`.${side}-port`).value || 3306,
        user: row.querySelector(`.${side}-user`).value.trim(),
        password: row.querySelector(`.${side}-pw`).value,
      });
      const ref = conn("ref"), tgt = conn("tgt");
      if (ref.host) {
        const d = { name, type: "mysql", ...ref };
        if (row._schemas) d.schemas = row._schemas;
        if (row._exclude) d.exclude_tables = row._exclude;
        oldDS.push(d);
      }
      if (tgt.host) newDS.push({ name, type: "mysql", ...tgt });
    });
    const stack = key => ({
      base_url: document.getElementById(`${key}-url`).value.trim(),
      datastores: key === "old" ? oldDS : newDS,
    });
    const rules = [...rulesBox.querySelectorAll(".sortrule")].map(div => ({
      path: div.querySelector(".sr-path").value.trim(),
      by: div.querySelector(".sr-by").value.trim() || "$canonical",
    })).filter(r => r.path);
    const payload = {
      old: stack("old"), new: stack("new"),
      attribution: {
        quiet_ms: +document.getElementById("at-quiet").value || 300,
        timeout_ms: +document.getElementById("at-timeout").value || 5000,
        check_innodb_trx: cfg.attribution?.check_innodb_trx ?? true,
      },
      noise: { response_paths: lines("ns-resp"), columns: lines("ns-cols"), tables_ignore: lines("ns-tables") },
      compare: { sort_arrays: rules },
      http_timeout_s: +document.getElementById("http-timeout").value || 10,
      compare_headers: cfg.compare_headers || [],
      report: cfg.report || {dir: "./report"},
      corpus: cfg.corpus || {dir: "./corpus"},
    };
    try {
      cfgCache = await api("/api/config", {method:"PUT", headers:{"content-type":"application/json"},
        body: JSON.stringify(payload)});
      toast(t("saved"));
    } catch (e) { toast(t("err_prefix") + e.message); }
  };
}

/* ------------------------------------------------------------------ boot */
render();
api("/api/replay/status").then(st => { if (st.running) startReplayPoll(); }).catch(() => {});
</script>
