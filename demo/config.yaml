# mocking-box demo config — box runs on the host, targets docker-compose demo
old:
  base_url: "http://localhost:8081"
  mysql: { host: 127.0.0.1, port: 3307, user: root, password: root }

new:
  base_url: "http://localhost:8082"
  mysql: { host: 127.0.0.1, port: 3308, user: root, password: root }

attribution:
  quiet_ms: 300
  timeout_ms: 5000

noise:
  response_paths:
    - "**.updated_at"
    - "**.created_at"
  columns:
    - "*.updated_at"
    - "*.created_at"
  tables_ignore: []

# 매퍼별 배열 순서 차이를 흡수하려면 정렬 규칙 추가 (UI 설정 탭에서도 편집 가능)
# compare:
