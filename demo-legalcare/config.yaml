attribution:
    check_innodb_trx: true
    quiet_ms: 300
    timeout_ms: 5000
compare:
    sort_arrays:
        - by: contract_id
          path: contracts
compare_headers: []
corpus:
    dir: ./corpus
http_timeout_s: 10
new:
    base_url: http://localhost:10104
    datastores:
        - exclude_tables: []
          host: 127.0.0.1
          name: lawkit-db
          password: root
          port: 13307
          schemas:
            - lawkit
          seed_from:
            host: 127.0.0.1
            password: root
            port: 13306
            user: root
          type: mysql
          user: root
noise:
    columns:
        - '*.updated_at'
        - '*.created_at'
    response_paths:
        - '**.updated_at'
        - '**.created_at'
    tables_ignore: []
old:
    base_url: http://localhost:10103
    datastores:
        - exclude_tables: []
          host: 127.0.0.1
          name: lawkit-db
          password: root
          port: 13306
          schemas: []
          type: mysql
          user: root
report:
    dir: ./report
