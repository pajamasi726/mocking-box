# mocking-box 배포 config (DELL) — legalcare-renew(medilawyer/PostgreSQL) 검증
#
# new = 검증 대상(리뉴얼): legalcare-renew 앱 + 이 compose의 검증용 PostgreSQL
# old = 기준: 운영 medilawyer (복사 소스, 읽기전용 SELECT만)

new:
  base_url: "http://host.docker.internal:10000"   # legalcare-renew 게이트웨이
  datastores:
    - name: medi-db
      type: postgres
      host: postgres-new           # 이 compose의 검증용 PG
      port: 5432
      user: postgres
      password: mbroot
      database: medilawyer         # renew booster가 보는 CORE DB 이름

old:
  base_url: "http://host.docker.internal:10000"
  datastores:
    - name: medi-db
      type: postgres
      host: "medilawyer-prod.crwcm0kcu3go.ap-northeast-2.rds.amazonaws.com"
      port: 15431
      user: "u_legalcare"
      password: "Legal9955P!"
      database: "medilawyer-prod"   # 하이픈 포함 (운영 DB 이름)
      # 975GB 엑스레이 이미지 테이블 제외 — 나머지 92테이블(~16GB)만 복사
      exclude_tables:
        - "public.boost_dental_image"

attribution:
  quiet_ms: 400
  timeout_ms: 5000

noise:
  response_paths:
    - "**.updated_at"
    - "**.created_at"
  columns:
    - "*.updated_at"
    - "*.created_at"

compare:
  sort_arrays: []

report: { dir: "/work/report" }
corpus: { dir: "/work/corpus" }
